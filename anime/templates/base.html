<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Anime Ranking{% endblock %}</title>
    <style>
        :root {
            --bg: #f3f0ea;
            --card: #faf7f1;
            --surface: #fdfbf8;
            --surface-2: #f7f2ea;
            --text: #1f1b18;
            --muted: #6a6057;
            --line: #d7c9b7;
            --accent: #8f6a3c;
            --accent-deep: #5f4426;
            --danger: #b4233b;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: linear-gradient(180deg, #f5f2ec 0%, var(--bg) 100%);
            color: var(--text);
            font-family: "Yu Mincho", "Hiragino Mincho ProN", "Noto Serif JP", serif;
            line-height: 1.5;
        }

        .container {
            width: min(1440px, 96vw);
            margin: 0 auto;
            padding: 24px 0 48px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            gap: 12px;
            flex-wrap: wrap;
            padding-bottom: 12px;
            border-bottom: 1px solid #d2c3b1;
        }

        .card {
            background: linear-gradient(180deg, #fcfaf6 0%, var(--card) 100%);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(30, 25, 20, 0.06);
            padding: 16px;
            position: relative;
        }

        .card::before {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #d6c2a5, transparent);
        }

        .topbar h1 {
            color: var(--accent-deep);
            letter-spacing: 0.04em;
            font-weight: 700;
            font-size: clamp(1.5rem, 2vw, 2rem);
        }

        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
            gap: 10px;
        }

        .section-title {
            margin: 0;
            color: #503921;
            letter-spacing: 0.04em;
            font-size: 1.15rem;
        }

        .section-head::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, #c5ad8b, transparent);
        }

        .btn {
            border: 1px solid #76542f;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: 600;
            background: linear-gradient(180deg, #9e7746 0%, var(--accent) 100%);
            color: white;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(70, 48, 24, 0.25);
            filter: brightness(1.02);
        }

        .btn-secondary {
            background: #4f473f;
            border-color: #3f3831;
        }

        .stack {
            display: grid;
            gap: 16px;
        }

        .muted {
            color: var(--muted);
        }

        .filter-card {
            padding: 14px 16px;
            border-top: 2px solid #b49773;
        }

        .filter-form {
            display: flex;
            gap: 12px;
            align-items: end;
            flex-wrap: wrap;
        }

        .filter-field {
            min-width: 170px;
        }

        .filter-label {
            display: block;
            font-size: 0.75rem;
            color: #6f6154;
            margin-bottom: 6px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 700;
        }

        .filter-select-wrap {
            position: relative;
        }

        .filter-select-wrap::after {
            content: "";
            position: absolute;
            right: 12px;
            top: 50%;
            width: 8px;
            height: 8px;
            border-right: 2px solid #7a6249;
            border-bottom: 2px solid #7a6249;
            transform: translateY(-70%) rotate(45deg);
            pointer-events: none;
        }

        .filter-input {
            width: 100%;
            min-width: 130px;
            padding: 10px 34px 10px 12px;
            border: 1px solid #bfa88d;
            border-radius: 6px;
            background: linear-gradient(180deg, #fffdf9 0%, #f8f2e9 100%);
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            transition: border-color 0.14s ease, box-shadow 0.14s ease;
        }

        .filter-input:hover {
            border-color: #9f825f;
        }

        .filter-input:focus {
            outline: none;
            border-color: #87643b;
            box-shadow: 0 0 0 2px rgba(143, 106, 60, 0.16);
        }

        .filter-actions {
            display: flex;
            gap: 8px;
        }

        .active-filter {
            color: var(--accent-deep);
            margin: 4px 0 12px;
            font-size: 0.9rem;
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 14px;
        }

        .infinite-status {
            margin-top: 10px;
            color: var(--muted);
            font-size: 0.82rem;
            text-align: center;
            letter-spacing: 0.04em;
        }

        .infinite-sentinel {
            height: 2px;
        }

        .anime-item {
            background: linear-gradient(180deg, var(--surface) 0%, var(--surface-2) 100%);
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 10px;
            transition: border-color 0.14s ease, box-shadow 0.14s ease, transform 0.14s ease;
        }

        .anime-item:hover {
            border-color: #b59b7c;
            box-shadow: 0 7px 14px rgba(45, 35, 25, 0.12);
            transform: translateY(-1px);
        }

        .anime-cover {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            border-radius: 4px;
            background: #eee5da;
            border: 1px solid var(--line);
            display: block;
            transition: transform 0.22s ease;
        }

        .anime-item:hover .anime-cover {
            transform: scale(1.015);
        }

        .drag-chosen {
            border-color: #8f6a3c;
            box-shadow: 0 10px 22px rgba(45, 35, 25, 0.22);
        }

        .drag-ghost {
            opacity: 0.55;
            transform: scale(0.98);
        }

        .anime-meta {
            margin-top: 8px;
            display: grid;
            gap: 5px;
        }

        .anime-title {
            font-weight: 700;
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.7em;
        }

        .anime-score-line {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .edit-input {
            width: 100%;
            border: 1px solid #bfa88d;
            border-radius: 6px;
            padding: 7px 9px;
            font-family: inherit;
            font-size: 0.92rem;
            background: #fff;
            color: var(--text);
        }

        .edit-input:focus {
            outline: none;
            border-color: #87643b;
            box-shadow: 0 0 0 2px rgba(143, 106, 60, 0.14);
        }

        .edit-actions {
            display: flex;
            gap: 6px;
            margin-top: 2px;
        }

        .mini-btn {
            border: 1px solid #8d6a44;
            border-radius: 6px;
            background: #8f6a3c;
            color: #fff;
            padding: 4px 8px;
            font-size: 0.78rem;
            cursor: pointer;
            transition: filter 0.12s ease;
        }

        .mini-btn:hover {
            filter: brightness(1.05);
        }

        .mini-btn.ghost {
            background: #f3ece3;
            color: #4f4338;
            border-color: #cbb59b;
        }

        .mini-btn.danger {
            background: #8b2f2f;
            border-color: #742626;
        }

        .mini-btn:disabled {
            opacity: 0.6;
            cursor: wait;
        }

        .edit-error {
            margin: 2px 0 0;
            color: #9a2340;
            font-size: 0.78rem;
        }

        .rank-badge {
            min-width: 2.2rem;
            text-align: center;
            display: inline-block;
            border-radius: 999px;
            font-size: 0.78rem;
            padding: 2px 8px;
            color: #fff;
            font-weight: 700;
        }

        .rank-S { background: #7d163f; }
        .rank-A { background: #8f6a1f; }
        .rank-B { background: #1f5f73; }
        .rank-C { background: #4f6a40; }
        .rank-F { background: #4d433a; }

        .unscored {
            background: #7b695d;
        }

        @media (max-width: 700px) {
            .container {
                width: min(1440px, 97vw);
            }

            .filter-form {
                display: grid;
                grid-template-columns: 1fr 1fr;
                align-items: stretch;
            }

            .filter-field {
                min-width: 0;
            }

            .filter-actions {
                grid-column: 1 / -1;
            }

            .anime-grid {
                grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="topbar">
        <h1 style="margin:0;">Anime Ranking</h1>
        {% if user.is_authenticated %}
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="btn btn-secondary">ログアウト</button>
            </form>
        {% endif %}
    </div>
    {% block content %}{% endblock %}
</div>
</body>
</html>
